pool:
  vmImage: windows-latest

trigger:
  paths:
    include:
    # Only trigger on update of `current.zip`
    - current.zip

resources:
  repositories:
    - repository: dumped-cs
      type: github
      endpoint: RaenonX-PokemonSleep
      name: RaenonX-PokemonSleep/pokemon-sleep-dumped-cs
    - repository: dumped-api-typing
      type: github
      endpoint: RaenonX-PokemonSleep
      name: RaenonX-PokemonSleep/pokemon-sleep-dumped-api-typing

variables:
  - template: variables/main.yml

stages:
- stage: DumpCS
  displayName: Dump C#
  jobs:
    - job: DumpCS
      displayName: Dump C#
      steps:
        - template: templates/setup.yml

        - task: ExtractFiles@1
          displayName: 'Extract Binary ZIP'
          inputs:
            archiveFilePatterns: $(REPO_APK_DUMPER_ABS_DIR)/current.zip
            destinationFolder: $(REPO_APK_DUMPER_ABS_DIR)
            cleanDestinationFolder: false

        - powershell: |
            Get-FileHash .\libil2cpp.so -Algorithm MD5
            Get-FileHash .\global-metadata.dat -Algorithm MD5
          displayName: 'Print File Hash'
          workingDirectory: $(REPO_APK_DUMPER_ABS_DIR)

        - powershell: |
            $unityVersion = $(Invoke-RestMethod -Uri "https://raw.githubusercontent.com/RaenonX-PokemonSleep/pokemon-sleep-apk-dumper/refs/heads/main/current-version-unity.txt")

            .\.tool\Cpp2IL-d526068.exe `
              --force-binary-path .\libil2cpp.so `
              --force-metadata-path .\global-metadata.dat `
              --force-unity-version $unityVersion `
              --output-as diffable-cs `
              --output-to "$(CPP_DUMP_OUTPUT_DIR)"
          displayName: 'Dump C# files'
          workingDirectory: $(REPO_APK_DUMPER_ABS_DIR)

        - powershell: |
            Copy-Item `
              -Path "$(CPP_DUMP_OUTPUT_DIR)\DiffableCs\PSMain\*" `
              -Destination "$(DUMPED_CS_DIR)" `
              -Force `
              -Recurse
          displayName: 'Copy dumped C# files'
          workingDirectory: $(REPO_APK_DUMPER_ABS_DIR)

        - task: PowerShell@2
          displayName: Cleanup Dump Metadata
          inputs:
            filePath: '$(REPO_APK_DUMPER_ABS_DIR)\.tool\Cleanup-Meta.ps1'
            arguments: '-CsFileDir $(DUMPED_CS_DIR)'
            showWarnings: true
            pwsh: true

        - task: PowerShell@2
          displayName: Sort Asset Addresses
          inputs:
            filePath: '$(REPO_APK_DUMPER_ABS_DIR)\.tool\Sort-Asset-Addresses.ps1'
            arguments: '-AddressableAssetsPath $(ASSET_ADDRESSES_SOURCE_PATH) -OutputPath $(ASSET_ADDRESSES_OUTPUT_PATH)'
            showWarnings: true
            pwsh: true

        - task: PowerShell@2
          displayName: Commit C# Dump Changes
          inputs:
            targetType: 'inline'
            script: |
              $Version = $(Get-Content -Path "$(REPO_APK_DUMPER_ABS_DIR)\current-version.txt")
              git checkout main
              git add .
              git commit -m "Updated C# dumps to $Version by $(Build.Repository.Name)@$(Build.SourceVersion)" || echo "No changes to commit"
              git push origin main
            showWarnings: true
            workingDirectory: $(REPO_DUMPED_CS_ABS_DIR)
            pwsh: true

- stage: DumpApiTyping
  displayName: Dump API Typing
  dependsOn: DumpCS
  jobs:
    - job: DumpApiTyping
      displayName: Dump API Typing
      steps:
        - checkout: self
          displayName: Checkout Dumper Repo
          path: $(REPO_APK_DUMPER_DIR)

        - checkout: dumped-cs
          displayName: Checkout Dumped C# Repo
          path: $(REPO_DUMPED_CS_DIR)

        - checkout: dumped-api-typing
          displayName: Checkout API Typing Repo
          persistCredentials: true
          fetchDepth: 0
          path: $(REPO_API_TYPING_DIR)

        - script: |
            git config --global user.email "raenonx0710@gmail.com"
            git config --global user.name "RaenonX (API Typing Dump)"
            git config --global core.autocrlf false
          displayName: Configure Git
          workingDirectory: $(REPO_API_TYPING_ABS_DIR)

        - powershell: |
            & "$(REPO_APK_DUMPER_ABS_DIR)\.tool\PsApiAnalyzer-1dd6e24.exe" `
              -input "$(DUMPED_CS_DIR)" `
              -output "$(REPO_API_TYPING_ABS_DIR)"
          displayName: 'Dump API Typing'
          workingDirectory: $(REPO_APK_DUMPER_ABS_DIR)

        - task: PowerShell@2
          displayName: Commit API Typing Changes
          inputs:
            targetType: 'inline'
            script: |
              $Version = $(Get-Content -Path "$(REPO_APK_DUMPER_ABS_DIR)\current-version.txt")
              git checkout main
              git add .
              git commit -m "Updated API typing to $Version by $(Build.Repository.Name)@$(Build.SourceVersion)" || echo "No changes to commit"
              git push origin main
            showWarnings: true
            workingDirectory: $(REPO_API_TYPING_ABS_DIR)
            pwsh: true
